<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - BarberApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0b0f19; color: #f8fafc; display: flex; justify-content: center; min-height: 100vh; }
        .mobile-container { width: 100%; max-width: 480px; background: #131b2f; min-height: 100vh; padding: 30px 20px; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5);}
        
        .header { text-align: center; margin-bottom: 40px; }
        .header i { font-size: 30px; color: #7c3aed; margin-bottom: 10px;}
        .header h1 { font-size: 24px; font-weight: 800; }
        
        .login-screen { display: flex; flex-direction: column; justify-content: center; height: 60vh; }
        .login-screen h2 { text-align: center; margin-bottom: 10px; }
        .login-screen p { color: #94a3b8; text-align: center; margin-bottom: 30px; font-size: 15px;}
        
        .hidden { display: none !important; }
        
        .card { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .card h3 { font-size: 16px; margin-bottom: 10px; color: #7c3aed; }
        .badge { background: rgba(245,158,11,0.1); color: #f59e0b; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; display: inline-block; margin-top: 10px;}
        .badge.concluido { background: rgba(16,185,129,0.1); color: #10b981; }

        .btn { background: linear-gradient(135deg, #7c3aed, #9333ea); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px);}
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 5px; font-weight: 600;}
        .form-group select, .form-group input { width: 100%; padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; outline: none; font-size: 15px; transition: 0.3s;}
        .form-group input:focus, .form-group select:focus { border-color: #7c3aed; background: rgba(124,58,237,0.05); }
        
        .profile-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: #1e293b; padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);}
        .profile-bar .barbearia-nome { font-size: 12px; color: #7c3aed; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 3px;}
        .profile-bar .logout { color: #ef4444; cursor: pointer; font-size: 14px; font-weight: 600;}
    </style>
</head>
<body>

<div class="mobile-container">
    <div class="header">
        <i class="fa-solid fa-scissors"></i>
        <h1>BARBER APP</h1>
    </div>

    <div id="login-area" class="login-screen">
        <h2>Área do Cliente</h2>
        <p>Digite seu E-mail e o Código da sua Barbearia para agendar um horário.</p>
        
        <form id="form-login">
            <div class="form-group">
                <label>Seu E-mail (Gmail, Hotmail, etc)</label>
                <input type="email" id="login-email" placeholder="exemplo@email.com" required>
            </div>
            <div class="form-group">
                <label>Código da Barbearia (ID)</label>
                <input type="number" id="login-id" placeholder="Ex: 1" required>
            </div>
            <button type="submit" class="btn">Conectar à Barbearia</button>
        </form>
    </div>

    <div id="dashboard-area" class="hidden">
        <div class="profile-bar">
            <div>
                <span class="barbearia-nome" id="barbearia-conectada">Barbearia</span>
                <span id="cliente-nome" style="font-weight: 600; font-size: 16px;">Carregando...</span>
            </div>
            <span class="logout" onclick="sair()"><i class="fa-solid fa-right-from-bracket"></i> Sair</span>
        </div>

        <button class="btn" style="margin-bottom: 30px;" onclick="mostrarAgendamento()"><i class="fa-solid fa-calendar-plus"></i> Novo Agendamento</button>

        <h2 style="font-size: 18px; margin-bottom: 15px;">Meus Agendamentos</h2>
        <div id="lista-agendamentos"></div>
    </div>

    <div id="agendamento-area" class="hidden">
        <h2 style="font-size: 18px; margin-bottom: 15px;"><i class="fa-solid fa-arrow-left" style="cursor:pointer; margin-right: 10px;" onclick="voltarDashboard()"></i> Escolha seu horário</h2>
        <form id="form-novo-agendamento">
            <div class="form-group"><label>Serviço</label><select id="select-servico" required></select></div>
            <div class="form-group"><label>Barbeiro de Preferência</label><select id="select-barbeiro" required></select></div>
            <div class="form-group"><label>Data</label><input type="date" id="input-data" required></div>
            <button type="submit" class="btn">Confirmar Agendamento</button>
        </form>
    </div>

</div>

<script>
    let clienteLogado = null;

    document.getElementById('form-login').addEventListener('submit', async (e) => {
        e.preventDefault();
        const res = await fetch('/api/cliente/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: document.getElementById('login-email').value, barber_id: document.getElementById('login-id').value })
        });
        const data = await res.json();
        if (res.ok) {
            clienteLogado = data.user;
            localStorage.setItem('clienteData', JSON.stringify(data.user));
            iniciarDashboard();
        } else {
            alert(data.error); 
        }
    });

    window.onload = () => { const salvo = localStorage.getItem('clienteData'); if (salvo) { clienteLogado = JSON.parse(salvo); iniciarDashboard(); } }
    function sair() { localStorage.removeItem('clienteData'); window.location.reload(); }

    function iniciarDashboard() {
        document.getElementById('login-area').classList.add('hidden');
        document.getElementById('dashboard-area').classList.remove('hidden');
        document.getElementById('cliente-nome').innerText = "Olá, " + clienteLogado.nome;
        document.getElementById('barbearia-conectada').innerText = "Conectado: " + clienteLogado.nomeBarbearia;
        carregarAgendamentos();
    }

    async function carregarAgendamentos() {
        const res = await fetch(`/api/cliente/agendamentos?email=${clienteLogado.email}`);
        const agendamentos = await res.json();
        const div = document.getElementById('lista-agendamentos');
        div.innerHTML = '';
        if(agendamentos.length === 0) { div.innerHTML = '<p style="color:#94a3b8; font-size:14px; text-align:center; padding: 20px;">Nenhum agendamento encontrado.</p>'; return; }
        agendamentos.forEach(ag => {
            const statusClass = ag.status === 'Concluído' ? 'badge concluido' : 'badge';
            div.innerHTML += `<div class="card"><h3>${ag.servico}</h3><p style="font-size: 14px; color: #cbd5e1;"><i class="fa-solid fa-calendar-days"></i> ${ag.data.split('-').reverse().join('/')}</p><p style="font-size: 14px; color: #cbd5e1; margin-top: 5px;"><i class="fa-solid fa-user"></i> Com ${ag.barbeiro}</p><span class="${statusClass}">${ag.status}</span></div>`;
        });
    }

    async function mostrarAgendamento() {
        document.getElementById('dashboard-area').classList.add('hidden');
        document.getElementById('agendamento-area').classList.remove('hidden');
        
        const resServicos = await fetch('/api/servicos'); const servicos = await resServicos.json();
        const selS = document.getElementById('select-servico'); selS.innerHTML = '<option value="" disabled selected>Escolha o serviço</option>';
        servicos.forEach(s => selS.innerHTML += `<option value="${s.nome}">${s.nome} - R$ ${s.preco}</option>`);

        const resBarbeiros = await fetch('/api/barbeiros'); const barbeiros = await resBarbeiros.json();
        const selB = document.getElementById('select-barbeiro'); selB.innerHTML = '<option value="" disabled selected>Qualquer barbeiro</option>';
        barbeiros.forEach(b => selB.innerHTML += `<option value="${b.nome}">${b.nome}</option>`);
    }

    function voltarDashboard() { document.getElementById('agendamento-area').classList.add('hidden'); document.getElementById('dashboard-area').classList.remove('hidden'); }

    document.getElementById('form-novo-agendamento').addEventListener('submit', async (e) => {
        e.preventDefault();
        const res = await fetch('/api/cliente/agendar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: clienteLogado.email, servico: document.getElementById('select-servico').value, barbeiro: document.getElementById('select-barbeiro').value || 'Equipe', data: document.getElementById('input-data').value })
        });
        if(res.ok) { alert('Agendamento enviado para a barbearia!'); document.getElementById('form-novo-agendamento').reset(); voltarDashboard(); carregarAgendamentos(); }
    });
</script>
</body>
</html>
